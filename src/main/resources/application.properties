spring.application.name=dailyNews

server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/dailyNews}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=3000

newsapi.key=${NEWS_API_KEY:}

jwt.secret=${JWT_SECRET:dev-only-secret-key-change-me-3f8a9c2e7b1d4f6a0c5e8b2d}
jwt.expiration=3600000
